[provider]
name = "deepseek"
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
timeout_seconds = 120
max_attempts = 3

[agent]
temperature = 0.0
max_output_tokens = 4096

[run]
max_iterations = 20
max_model_calls = 20
max_tool_calls = 50
max_wall_time_seconds = 900

[tools]
default_timeout_seconds = 30
max_result_chars = 20000

[context]
char_to_token_ratio = 4.0
max_estimated_input_tokens = 120000
recent_turns = 3

[persistence]
enabled = true
runtime_db = ".harness/runtime.sqlite3"
auto_recover_safe = true
checkpoint_retention_per_turn = 20
fail_on_integrity_error = true

[memory]
enabled = true
read_enabled = true
write_enabled = true
auto_extract = false
database = ".harness/memory.sqlite3"
max_results = 10
max_context_fraction = 0.05

[compaction]
enabled = true
auto_compact = true
idle_only = true
estimated_token_threshold = 0.75
retain_recent_turns = 6
max_summary_chars = 12000

[trace]
directory = ".harness/runs"
thread_directory = ".harness/threads"
session_directory = ".harness/sessions"
fail_on_write_error = true

[subagents]
max_concurrent = 3
max_total = 8
max_depth = 1
max_turns_per_thread = 4
max_followup_message_chars = 8000

[security]
sandbox_mode = "workspace-write"
approval_policy = "on-request"
sandbox_required = true
trusted_project = false

[security.network]
mode = "none"

[security.environment]
allow = ["PATH", "LANG", "LC_ALL", "TERM", "SYSTEMROOT", "WINDIR"]

[security.sandbox]
backend = "auto"
default_timeout_seconds = 120
max_output_chars = 50000
# Windows 可指定已安装且包含 bubblewrap 的 WSL2 发行版：
# wsl_distribution = "Ubuntu"

[guidance]
enabled = true
max_guidance_bytes = 32768
max_import_depth = 4
max_import_files = 32
max_import_total_bytes = 32768
project_doc_fallback_filenames = ["CLAUDE.md"]
require_workspace_trust = true

[guidance.rules]
activate_search_candidates = false

[skills]
enabled = true
require_workspace_trust = true
catalog_context_ratio = 0.02
catalog_fallback_max_chars = 8000
max_skills = 500
max_skill_scan_depth = 6
max_skill_directories = 2000
max_resource_bytes = 100000
support_fork_context = true

[[skills.config]]
id = "user:deploy-production"
enabled = false

[[permissions.rules]]
id = "deny-git-push"
decision = "deny"
tool = "run_command"
argv_prefix = ["git", "push"]

[[permissions.rules]]
id = "allow-pytest"
decision = "allow"
tool = "run_command"
argv_prefix = ["pytest"]
